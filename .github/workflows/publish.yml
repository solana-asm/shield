name: Publish SDK to npm
run-name: sdk release ${{ github.ref_name }}

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    defaults:
      run:
        working-directory: sdk
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: bun install
        working-directory: .

      - name: Verify tag matches sdk version
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          pkg=$(node -p "require('./package.json').version")
          if [ "$tag" != "$pkg" ]; then
            echo "tag v$tag does not match sdk/package.json version $pkg"
            exit 1
          fi

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      - name: Check if version is already published
        id: published
        run: |
          version=$(node -p "require('./package.json').version")
          existing=$(npm view "@solana-asm/shield@${version}" version 2>/dev/null || echo "")
          if [ "$existing" = "$version" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "@solana-asm/shield@${version} is already published; skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        if: steps.published.outputs.skip == 'false'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        working-directory: .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "release $tag already exists; skipping"
            exit 0
          fi
          prerelease_flag=""
          if [[ "$tag" == *-* ]]; then
            prerelease_flag="--prerelease"
          fi
          gh release create "$tag" \
            --title "$tag" \
            --generate-notes \
            $prerelease_flag
